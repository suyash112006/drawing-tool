<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Overlay</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0a0a0f;
            color: #fff;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 50px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            max-width: 500px;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00ffcc, #00bfff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            color: #8b8b9a;
            font-size: 1.1rem;
            margin-bottom: 30px;
            line-height: 1.5;
        }
        .action-area {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        input {
            padding: 15px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.5);
            color: white;
            font-size: 1rem;
            text-align: center;
            outline: none;
        }
        input:focus {
            border-color: #00ffcc;
        }
        button {
            padding: 15px;
            border-radius: 10px;
            border: none;
            background: #00ffcc;
            color: #000;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 255, 204, 0.3);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Trading Overlay</h1>
        <p>The ultimate real-time collaborative drawing tool for traders. Join a room from your browser to start drawing with your friends.</p>
        
        <div class="action-area">
            <input type="text" id="roomIdInput" placeholder="Enter Room ID (e.g. global-trading-room)">
            <button onclick="joinRoom()">Join Room</button>
        </div>
    </div>

    <script>
        function joinRoom() {
            let roomId = document.getElementById('roomIdInput').value.trim();
            if (roomId) {
                // If the user accidentally pasted the full invite link, extract the ID
                if (roomId.includes('?id=')) {
                    roomId = new URL(roomId).searchParams.get('id');
                }
                window.location.href = `/room.html?id=${encodeURIComponent(roomId)}`;
            } else {
                window.location.href = `/room.html?id=global-trading-room`;
            }
        }
        // Allow pressing Enter to join
        document.getElementById('roomIdInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') joinRoom();
        });
    </script>
</body>
</html>
